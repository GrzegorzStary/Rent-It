{% extends 'base.html' %}
{% load static %}

{% block title %} | Search Results{% endblock %}

{% block extra_css %}

<h2>Search results for "{{ query }}"</h2>

{% if results %}
  <ul>
    {% for item in results %}
      <li>{{ item.name }}</li>
    {% endfor %}
  </ul>
{% else %}
  <p>No results found.</p>
{% endif %}

{% endblock %}
